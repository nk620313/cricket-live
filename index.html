<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0d1a" />
  <meta name="description" content="IPL 2026 Live Cricket Scores, AI Commentary & Points Table" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CricketLIVE" />

  <title>CricketLIVE — IPL 2026</title>

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json" />

  <!-- Icons -->
  <link rel="icon" type="image/png" href="icon-192.png" />
  <link rel="apple-touch-icon" href="icon-192.png" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans:wght@400;600;700;900&display=swap" rel="stylesheet" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080818;
      color: #fff;
      font-family: 'Noto Sans', sans-serif;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    #app { min-height: 100vh; }

    /* PWA Install Banner */
    #install-banner {
      display: none;
      position: fixed;
      bottom: 80px;
      left: 12px;
      right: 12px;
      background: linear-gradient(135deg, #1a0533, #0d1b4b);
      border: 1px solid rgba(255,215,0,0.4);
      border-radius: 16px;
      padding: 14px 16px;
      z-index: 999;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      animation: slideUp 0.4s ease;
    }
    #install-banner.show { display: flex; align-items: center; gap: 12px; }
    #install-btn {
      background: linear-gradient(135deg, #ffd700, #ff8c00);
      color: #000;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-weight: 800;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
    }
    #dismiss-btn {
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      font-size: 20px;
      cursor: pointer;
      margin-left: auto;
    }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    @keyframes slideUp { from{transform:translateY(20px);opacity:0} to{transform:translateY(0);opacity:1} }
    @keyframes spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
    @keyframes ticker { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 2px; }

    .tab-content { animation: fadeIn 0.3s ease; }

    .match-card {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 18px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }
    .match-card.live {
      border-color: rgba(255,80,80,0.4);
      box-shadow: 0 0 20px rgba(255,80,80,0.1);
    }
    .match-card:active { transform: scale(0.98); }

    .live-strip {
      position: absolute;
      top: 0; left: 0; right: 0; height: 2px;
      background: linear-gradient(90deg, transparent, #ff4444, transparent);
      animation: shimmer 2s infinite;
    }
    @keyframes shimmer {
      0%{background-position:-200%} 100%{background-position:200%}
    }

    .team-badge {
      width: 52px; height: 52px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin: 0 auto 8px;
    }

    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      z-index: 500;
      display: flex; align-items: center; justify-content: center;
      padding: 20px;
      animation: fadeIn 0.2s ease;
    }

    .modal-box {
      background: linear-gradient(135deg, #0d0d1a, #1a1a3e);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 24px;
      padding: 24px;
      width: 100%;
      max-width: 420px;
      max-height: 80vh;
      overflow-y: auto;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(10,10,25,0.95);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,0.08);
      display: flex;
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom);
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: rgba(255,255,255,0.4);
      padding: 12px 8px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      font-family: 'Noto Sans', sans-serif;
      font-weight: 700;
      letter-spacing: 0.5px;
      transition: color 0.2s;
    }
    .nav-btn.active { color: #ffd700; }
    .nav-btn span:first-child { font-size: 20px; }

    .section-label {
      color: rgba(255,255,255,0.4);
      font-size: 10px;
      letter-spacing: 2px;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .points-row {
      display: grid;
      grid-template-columns: 28px 1fr 28px 28px 28px 42px 52px;
      gap: 6px;
      padding: 11px 14px;
      align-items: center;
    }

    .team-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .team-card {
      border-radius: 14px;
      padding: 16px;
      text-align: center;
      transition: transform 0.2s;
    }
    .team-card:active { transform: scale(0.96); }
  </style>
</head>
<body>
  <div id="app">
    <!-- App loads here via JS -->
    <div style="display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;">
      <div style="font-size:48px;animation:spin 1s linear infinite">🏏</div>
      <div style="color:rgba(255,255,255,0.5);font-size:14px">Loading CricketLIVE...</div>
    </div>
  </div>

  <!-- PWA Install Banner -->
  <div id="install-banner">
    <div>
      <div style="font-weight:700;font-size:13px">📲 Phone pe Install karo!</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px">App jaisa experience milega</div>
    </div>
    <button id="install-btn">Install</button>
    <button id="dismiss-btn">×</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
